<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if not .IsHome }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />

  {{/* Open Graph */}}
  <meta property="og:title" content="{{ .Title }}" />
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
  <meta property="og:url" content="{{ .Permalink }}" />
  {{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}" />{{ end }}
  <meta property="og:site_name" content="{{ .Site.Title }}" />

  {{/* Tailwind CSS via CDN */}}
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "tertiary-fixed-dim": "#e9c400",
            "surface-container": "#eaeef3",
            "inverse-on-surface": "#edf1f6",
            "secondary-fixed": "#dee3e9",
            "surface-container-highest": "#dfe3e8",
            "tertiary-container": "#c9a900",
            "surface-bright": "#f6faff",
            "outline": "#72787e",
            "on-surface": "#171c20",
            "tertiary": "#705d00",
            "on-secondary-container": "#5d6368",
            "secondary-fixed-dim": "#c1c7cd",
            "surface-container-lowest": "#ffffff",
            "surface": "#f6faff",
            "on-tertiary-fixed-variant": "#544600",
            "tertiary-fixed": "#ffe16d",
            "on-secondary-fixed": "#161c21",
            "on-primary": "#ffffff",
            "on-secondary-fixed-variant": "#41474c",
            "on-primary-fixed-variant": "#184b6a",
            "surface-dim": "#d6dadf",
            "surface-container-low": "#f0f4f9",
            "on-tertiary-fixed": "#221b00",
            "inverse-surface": "#2c3135",
            "on-primary-fixed": "#001e2f",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#e4e9ed",
            "on-error": "#ffffff",
            "background": "#f6faff",
            "on-secondary": "#ffffff",
            "error-container": "#ffdad6",
            "surface-variant": "#dfe3e8",
            "primary": "#00263b",
            "surface-tint": "#346383",
            "on-tertiary-container": "#4c3f00",
            "on-background": "#171c20",
            "on-error-container": "#93000a",
            "primary-fixed-dim": "#9eccf0",
            "secondary-container": "#dbe0e6",
            "on-primary-container": "#7ba8cb",
            "primary-container": "#003d5b",
            "outline-variant": "#c1c7ce",
            "on-surface-variant": "#41474d",
            "primary-fixed": "#cae6ff",
            "error": "#ba1a1a",
            "secondary": "#595f64",
            "inverse-primary": "#9eccf0"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Public Sans"],
            "label": ["Public Sans"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>

  {{/* Google Fonts */}}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Public+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .text-editorial-balance {
      text-wrap: balance;
    }
    .editorial-shadow {
      box-shadow: 0 8px 40px rgba(23, 28, 32, 0.04);
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-tertiary-fixed selection:text-on-tertiary-fixed">

  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

</body>
</html>

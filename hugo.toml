  [[menus.main]]
    name = "Policies"
    pageRef = "/policies/"
    weight = 40
  [[menus.main]]
    name = "News"
    pageRef = "/news/"
    weight = 50
  [[menus.main]]
    name = "Press"
    pageRef = "/press/"
    weight = 55
  [[menus.main]]
    name = "Get Involved"
    pageRef = "/get-involved/"
